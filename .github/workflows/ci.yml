name: CI

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Decide whether the nix builds need to run. Builds depend only on nix/ (the
  # flake source) — everything else is referenced via mkOutOfStoreSymlink and
  # never read at build time — so a non-nix change cannot alter a build output.
  # On push/dispatch (no PR base) we run everything as the backstop.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" HEAD \
            | grep -qE '^(nix/|\.github/workflows/ci\.yml$)'; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  flake-check:
    name: flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('nix/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      # Evaluates every output for every system without building (--no-build),
      # so one x86_64 runner catches broken modules and option mistakes across
      # all hosts (incl. aarch64 and darwin) without cross-compiling. The
      # private submodule (private/) is intentionally not checked out: its
      # knowledge/ is read via mkOutOfStoreSymlink, and its overlay defaults to
      # the public stub (inputs.private), so eval and build never need it.
      - name: nix flake check (all systems, eval only)
        run: nix flake check --no-build --all-systems ./nix

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('nix/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      # Run the exact same git-hooks pipeline as the local pre-commit hook, so
      # CI and local commits share one source of truth (nix/flake.nix). Runs
      # from the repo root, so it lints all of nix/ and the shell scripts and
      # picks up the root statix.toml.
      - name: pre-commit (all files)
        run: nix develop ./nix --command pre-commit run --all-files --show-diff-on-failure

  # The template host (hosts/_template) ships a placeholder bootstrap password
  # so a fresh fork can log in (see #176). This guard fails if that placeholder
  # ever leaks into a real host config, so a fork that copies the template and
  # forgets to change it cannot ship a known credential. Cheap and content-only,
  # so it always runs (not gated on the nix/ filter).
  placeholder-guard:
    name: placeholder guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: no placeholder credential outside _template
        run: |
          if grep -rn 'changeme' nix/hosts --include='*.nix' \
            | grep -v '^nix/hosts/_template/'; then
            echo "placeholder bootstrap password found outside hosts/_template/ — change it before merging"
            exit 1
          fi
          echo "no placeholder credential outside the template"

  # Builds run on PRs that touch nix/ (and on every push/dispatch). They are
  # gated by `changes` because only nix/ can affect a build output. The matrix
  # is cheap (~4 min wall-clock, parallel); the VM boot test below is the slow
  # one and shares the same gate.
  build:
    name: build ${{ matrix.name }}
    needs: [flake-check, changes]
    if: needs.changes.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # OWNER HOSTS — replace these with your own hosts when you fork.
          - name: nix-dots (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.nix-dots.config.system.build.toplevel
          - name: nix-box (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: nixosConfigurations.nix-box.config.system.build.toplevel
          - name: home dev@dev-container (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: homeConfigurations."dev@dev-container".activationPackage
          - name: home quinnherden@kali-bug (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: homeConfigurations."quinnherden@kali-bug".activationPackage
          - name: mac-papi (aarch64-darwin)
            os: macos-latest
            attr: darwinConfigurations.mac-papi.system
          # KEEP THESE — generic forkable templates (nix/hosts/_template). They
          # prove the public layer builds without the private overlay, so a fork
          # should keep them even after replacing the owner hosts above. The
          # darwin template is eval-only (flake check --all-systems) since its
          # build path is already covered by mac-papi on the costly macOS runner.
          - name: template nixos (x86_64-linux)
            os: ubuntu-latest
            attr: nixosConfigurations.template.config.system.build.toplevel
          - name: template home (aarch64-linux)
            os: ubuntu-24.04-arm
            attr: homeConfigurations.template.activationPackage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('nix/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
      - name: nix build
        env:
          ATTR: ${{ matrix.attr }}
        run: nix build --no-link --print-out-paths "./nix#${ATTR}"

  # Boots nix-dots in a QEMU VM and asserts it reaches multi-user.target.
  # Needs KVM (x86_64 GitHub runners have it). Same nix/ gate as the builds —
  # it is the slow job (~11.5 min) so it only runs when nix/ actually changed.
  nixos-vm-test:
    name: nixos vm boot test (nix-dots)
    needs: [flake-check, changes]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-vmtest-${{ hashFiles('nix/flake.lock') }}
          restore-prefixes-first-match: nix-vmtest-
      - name: boot nix-dots in a VM
        run: nix build --no-link -L ./nix#checks.x86_64-linux.nix-dots-boot

  # Single required status check. Always runs; passes when every job is green or
  # skipped, fails if any failed. Lets build/nixos-vm-test stay conditional while
  # remaining enforceable as a branch-protection gate.
  ci-required:
    name: ci-required
    if: always()
    needs: [flake-check, lint, placeholder-guard, build, nixos-vm-test]
    runs-on: ubuntu-latest
    steps:
      - name: gate
        env:
          R_FLAKE: ${{ needs.flake-check.result }}
          R_LINT: ${{ needs.lint.result }}
          R_GUARD: ${{ needs.placeholder-guard.result }}
          R_BUILD: ${{ needs.build.result }}
          R_VM: ${{ needs.nixos-vm-test.result }}
        run: |
          echo "flake-check=$R_FLAKE lint=$R_LINT guard=$R_GUARD build=$R_BUILD vm=$R_VM"
          for r in "$R_FLAKE" "$R_LINT" "$R_GUARD" "$R_BUILD" "$R_VM"; do
            case "$r" in
              failure | cancelled)
                echo "required job not green: $r"
                exit 1
                ;;
            esac
          done
          echo "all required jobs green (success or skipped)"
